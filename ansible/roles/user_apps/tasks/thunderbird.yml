---
- name: 下载并解压 Thunderbird 官方原生版 (规避 Ubuntu Snap 依赖)
  unarchive:
    src: "https://download.mozilla.org/?product=thunderbird-latest-SSL&os=linux64&lang=zh-CN"
    dest: /opt/
    remote_src: true
    creates: /opt/thunderbird/thunderbird

- name: 拷贝自定义 Thunderbird 图标
  copy:
    src: thunderbird.png
    dest: /opt/thunderbird/thunderbird.png
    mode: "0644"

- name: 创建 Thunderbird 桌面快捷方式
  template:
    src: thunderbird.desktop.j2
    dest: /usr/share/applications/thunderbird.desktop
    mode: "0644"

- name: 设置 Thunderbird 开机自动启动 (系统全局)
  file:
    src: /usr/share/applications/thunderbird.desktop
    dest: /etc/xdg/autostart/thunderbird.desktop
    state: link