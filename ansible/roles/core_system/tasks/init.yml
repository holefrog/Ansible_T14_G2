---
- name: 1.1 更新管理员用户密码
  user:
    name: "{{ admin_user }}"
    password: "{{ admin_password_hash }}"

- name: 1.2 设置系统时区
  timezone:
    name: "{{ timezone }}"

- name: 1.3 生成并配置本地化 Locale
  block:
    - name: 生成 Locale
      locale_gen: { name: "{{ locale }}", state: present }
      
    - name: 获取当前系统 Locale
      command: localectl status
      register: localectl_status
      changed_when: false

    - name: 设置默认 Locale
      command: localectl set-locale LANG={{ locale }}
      when: "('LANG=' ~ locale) not in localectl_status.stdout"
