---
- name: 安装 yt-dlp 依赖 (ffmpeg)
  apt:
    name: ffmpeg
    state: present

- name: 下载并安装最新版 yt-dlp
  get_url:
    url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
    dest: /usr/local/bin/yt-dlp
    mode: '0755'
    owner: root
    group: root

- name: 检查 ~/.config/yt-dlp 是否错误地被创建成了文件
  stat:
    path: "/home/{{ admin_user }}/.config/yt-dlp"
  register: ytdlp_path_stat

- name: 删除错误的 yt-dlp 文件以腾出位置创建目录
  file:
    path: "/home/{{ admin_user }}/.config/yt-dlp"
    state: absent
  when: ytdlp_path_stat.stat.exists and ytdlp_path_stat.stat.isreg

- name: 创建 yt-dlp 配置目录
  file:
    path: "/home/{{ admin_user }}/.config/yt-dlp"
    state: directory
    mode: '0755'
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"

- name: 复制 yt-dlp 配置文件
  copy:
    src: yt-dlp-config
    dest: "/home/{{ admin_user }}/.config/yt-dlp/config"
    mode: '0644'
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
